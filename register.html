<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt Ol - AkıllıShop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2rem;
      }

      .auth-container {
        background: white;
        border-radius: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 500px;
        padding: 3rem;
        position: relative;
        overflow: hidden;
      }

      .auth-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
      }

      .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-logo .logo {
        justify-content: center;
        font-size: 2rem;
      }

      .auth-title {
        text-align: center;
        margin-bottom: 0.5rem;
        font-size: 1.75rem;
      }

      .auth-subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 2rem;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #0f172a;
      }

      .input-group {
        position: relative;
      }

      .input-group i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
      }

      .input-group input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .input-group input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .password-strength {
        height: 4px;
        background: #e2e8f0;
        border-radius: 2px;
        margin-top: 0.5rem;
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        width: 0;
        transition: all 0.3s ease;
        border-radius: 2px;
      }

      .password-strength-text {
        font-size: 0.7rem;
        margin-top: 0.25rem;
        color: #64748b;
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        color: #64748b;
      }

      .terms input {
        margin-top: 0.25rem;
        accent-color: #6366f1;
      }

      .terms a {
        color: #6366f1;
        font-weight: 500;
      }

      .btn-auth {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .auth-footer {
        text-align: center;
        color: #64748b;
      }

      .auth-footer a {
        color: #6366f1;
        font-weight: 600;
      }

      .alert-error {
        background: #fee2e2;
        color: #dc2626;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
      }

      @media (max-width: 480px) {
        .auth-container {
          padding: 2rem;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <div class="auth-logo">
          <a href="index.html" class="logo">
            <i class="fas fa-shopping-bag"></i>
            <span>AkıllıShop</span>
          </a>
        </div>

        <h1 class="auth-title">Hesap Oluşturun</h1>
        <p class="auth-subtitle">Hemen üye olun, avantajlardan yararlanın</p>

        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label>Ad</label>
              <div class="input-group">
                <i class="fas fa-user"></i>
                <input
                  type="text"
                  name="first_name"
                  placeholder="Adınız"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label>Soyad</label>
              <div class="input-group">
                <i class="fas fa-user"></i>
                <input
                  type="text"
                  name="last_name"
                  placeholder="Soyadınız"
                  required
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>E-posta Adresi</label>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                name="email"
                placeholder="ornek@email.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label>Telefon</label>
            <div class="input-group">
              <i class="fas fa-phone"></i>
              <input
                type="tel"
                name="phone"
                placeholder="05XX XXX XX XX"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label>Şifre</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strength-bar"></div>
            </div>
            <div class="password-strength-text" id="strength-text">
              Şifre gücü: Belirlenmedi
            </div>
          </div>

          <div class="form-group">
            <label>Şifre Tekrar</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                name="confirm_password"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <label class="terms">
            <input type="checkbox" name="terms" required />
            <span
              ><a href="#">Üyelik Sözleşmesi</a>'ni ve
              <a href="#">Gizlilik Politikası</a>'nı okudum, kabul
              ediyorum.</span
            >
          </label>

          <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-user-plus"></i> Kayıt Ol
          </button>
        </form>

        <div class="auth-footer">
          Zaten hesabınız var mı? <a href="login.html">Giriş yapın</a>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
