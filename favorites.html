<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorilerim - AkıllıShop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      .favorites-page {
        padding: 3rem 0;
      }

      .favorites-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 2rem;
      }

      .profile-sidebar {
        background: white;
        border-radius: var(--radius-xl);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
        height: fit-content;
      }

      .profile-user {
        text-align: center;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 1.5rem;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--primary-color);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 1rem;
      }

      .profile-menu {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .profile-menu a {
        padding: 0.875rem 1rem;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-dark);
        transition: var(--transition);
      }

      .profile-menu a:hover,
      .profile-menu a.active {
        background: var(--primary-color);
        color: white;
      }

      .favorites-content {
        background: white;
        border-radius: var(--radius-xl);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
      }

      .favorites-content h3 {
        margin-bottom: 1.5rem;
      }

      .favorites-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1.5rem;
      }

      .favorite-item {
        position: relative;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition: var(--transition);
      }

      .favorite-item:hover {
        box-shadow: var(--shadow-md);
      }

      .remove-favorite {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        width: 2rem;
        height: 2rem;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--danger-color);
        box-shadow: var(--shadow-sm);
        z-index: 2;
        transition: var(--transition);
      }

      .remove-favorite:hover {
        background: var(--danger-color);
        color: white;
      }

      .favorite-item img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }

      .favorite-info {
        padding: 1rem;
      }

      .favorite-info h4 {
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .favorite-price {
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 0.75rem;
      }

      .btn-add-cart {
        width: 100%;
        padding: 0.625rem;
        font-size: 0.875rem;
      }

      .empty-favorites {
        text-align: center;
        padding: 4rem 2rem;
      }

      .empty-favorites i {
        font-size: 4rem;
        color: var(--border-color);
        margin-bottom: 1rem;
      }

      @media (max-width: 768px) {
        .favorites-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="main-header">
      <div class="header-main">
        <div class="container">
          <a href="index.html" class="logo"
            ><i class="fas fa-shopping-bag"></i><span>AkıllıShop</span></a
          >
          <div class="header-actions">
            <a href="profile.html" class="header-action"
              ><i class="fas fa-user"></i
            ></a>
            <a href="cart.html" class="header-action"
              ><i class="fas fa-shopping-cart"></i
            ></a>
          </div>
        </div>
      </div>
    </header>

    <main class="container favorites-page">
      <div class="favorites-layout">
        <aside class="profile-sidebar">
          <div class="profile-user">
            <div class="profile-avatar">AY</div>
            <h3>Ahmet Yılmaz</h3>
            <p>ahmet@email.com</p>
          </div>
          <nav class="profile-menu">
            <a href="profile.html"
              ><i class="fas fa-user"></i> Profil Bilgileri</a
            >
            <a href="orders.html"
              ><i class="fas fa-shopping-bag"></i> Siparişlerim</a
            >
            <a href="addresses.html"
              ><i class="fas fa-map-marker-alt"></i> Adreslerim</a
            >
            <a href="favorites.html" class="active"
              ><i class="fas fa-heart"></i> Favorilerim</a
            >
            <a href="#"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
          </nav>
        </aside>

        <div class="favorites-content">
          <h3>Favorilerim (4 Ürün)</h3>

          <div class="favorites-grid">
            <div class="favorite-item">
              <button class="remove-favorite" onclick="removeFavorite(this)">
                <i class="fas fa-times"></i>
              </button>
              <img
                src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400"
                alt=""
              />
              <div class="favorite-info">
                <h4>Premium Kablosuz Kulaklık</h4>
                <div class="favorite-price">₺1.299,99</div>
                <button class="btn btn-primary btn-add-cart">
                  <i class="fas fa-shopping-cart"></i> Sepete Ekle
                </button>
              </div>
            </div>

            <div class="favorite-item">
              <button class="remove-favorite" onclick="removeFavorite(this)">
                <i class="fas fa-times"></i>
              </button>
              <img
                src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"
                alt=""
              />
              <div class="favorite-info">
                <h4>Akıllı Saat Pro</h4>
                <div class="favorite-price">₺2.499,99</div>
                <button class="btn btn-primary btn-add-cart">
                  <i class="fas fa-shopping-cart"></i> Sepete Ekle
                </button>
              </div>
            </div>

            <div class="favorite-item">
              <button class="remove-favorite" onclick="removeFavorite(this)">
                <i class="fas fa-times"></i>
              </button>
              <img
                src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
                alt=""
              />
              <div class="favorite-info">
                <h4>Spor Ayakkabı</h4>
                <div class="favorite-price">₺899,99</div>
                <button class="btn btn-primary btn-add-cart">
                  <i class="fas fa-shopping-cart"></i> Sepete Ekle
                </button>
              </div>
            </div>

            <div class="favorite-item">
              <button class="remove-favorite" onclick="removeFavorite(this)">
                <i class="fas fa-times"></i>
              </button>
              <img
                src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400"
                alt=""
              />
              <div class="favorite-info">
                <h4>Aynasız Fotoğraf Makinesi</h4>
                <div class="favorite-price">₺12.499,99</div>
                <button class="btn btn-primary btn-add-cart">
                  <i class="fas fa-shopping-cart"></i> Sepete Ekle
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      function removeFavorite(btn) {
        if (
          confirm("Bu ürünü favorilerden kaldırmak istediğinize emin misiniz?")
        ) {
          btn.closest(".favorite-item").remove();
        }
      }
    </script>
  </body>
</html>
