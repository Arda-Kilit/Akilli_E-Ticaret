<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profilim - AkıllıShop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <style>
      .profile-page {
        padding: 3rem 0;
      }

      .profile-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 2rem;
      }

      .profile-sidebar {
        background: white;
        border-radius: var(--radius-xl);
        padding: 1.5rem;
        box-shadow: var(--shadow-sm);
        height: fit-content;
      }

      .profile-user {
        text-align: center;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 1.5rem;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: var(--primary-color);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 1rem;
      }

      .profile-user h3 {
        margin-bottom: 0.25rem;
      }

      .profile-user p {
        color: var(--text-light);
        font-size: 0.875rem;
      }

      .profile-menu {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .profile-menu a {
        padding: 0.875rem 1rem;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--text-dark);
        transition: var(--transition);
      }

      .profile-menu a:hover,
      .profile-menu a.active {
        background: var(--primary-color);
        color: white;
      }

      .profile-menu a i {
        width: 1.5rem;
      }

      .profile-content {
        background: white;
        border-radius: var(--radius-xl);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
      }

      .profile-section h3 {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--border-color);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 0.875rem;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
      }

      .address-card {
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1rem;
        position: relative;
      }

      .address-card.default {
        border-color: var(--primary-color);
        background: #f0f7ff;
      }

      .address-badge {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: var(--primary-color);
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
      }

      .address-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      @media (max-width: 768px) {
        .profile-layout {
          grid-template-columns: 1fr;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="main-header">
      <div class="header-main">
        <div class="container">
          <a href="index.html" class="logo"
            ><i class="fas fa-shopping-bag"></i><span>AkıllıShop</span></a
          >
          <div class="header-actions">
            <a href="profile.html" class="header-action"
              ><i class="fas fa-user"></i
            ></a>
            <a href="cart.html" class="header-action"
              ><i class="fas fa-shopping-cart"></i
              ><span class="cart-count">3</span></a
            >
          </div>
        </div>
      </div>
    </header>

    <main class="container profile-page">
      <div class="profile-layout">
        <aside class="profile-sidebar">
          <div class="profile-user">
            <div class="profile-avatar">AY</div>
            <h3>Ahmet Yılmaz</h3>
            <p>ahmet@email.com</p>
          </div>

          <nav class="profile-menu">
            <a href="profile.html" class="active"
              ><i class="fas fa-user"></i> Profil Bilgileri</a
            >
            <a href="orders.html"
              ><i class="fas fa-shopping-bag"></i> Siparişlerim</a
            >
            <a href="addresses.html"
              ><i class="fas fa-map-marker-alt"></i> Adreslerim</a
            >
            <a href="favorites.html"
              ><i class="fas fa-heart"></i> Favorilerim</a
            >
            <a href="#"><i class="fas fa-bell"></i> Bildirimler</a>
            <a href="#" onclick="logout()"
              ><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a
            >
          </nav>
        </aside>

        <div class="profile-content">
          <div class="profile-section">
            <h3>Kişisel Bilgiler</h3>
            <form
              onsubmit="
                event.preventDefault();
                saveProfile();
              "
            >
              <div class="form-row">
                <div class="form-group">
                  <label>Ad</label>
                  <input type="text" value="Ahmet" />
                </div>
                <div class="form-group">
                  <label>Soyad</label>
                  <input type="text" value="Yılmaz" />
                </div>
              </div>
              <div class="form-group">
                <label>E-posta</label>
                <input type="email" value="ahmet@email.com" />
              </div>
              <div class="form-group">
                <label>Telefon</label>
                <input type="tel" value="0532 123 45 67" />
              </div>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Değişiklikleri Kaydet
              </button>
            </form>
          </div>

          <div class="profile-section" style="margin-top: 3rem">
            <h3>Şifre Değiştir</h3>
            <form
              onsubmit="
                event.preventDefault();
                changePassword();
              "
            >
              <div class="form-group">
                <label>Mevcut Şifre</label>
                <input type="password" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Yeni Şifre</label>
                  <input type="password" />
                </div>
                <div class="form-group">
                  <label>Yeni Şifre Tekrar</label>
                  <input type="password" />
                </div>
              </div>
              <button type="submit" class="btn btn-secondary">
                <i class="fas fa-key"></i> Şifreyi Güncelle
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script>
      function saveProfile() {
        alert("Profil bilgileri güncellendi!");
      }

      function changePassword() {
        alert("Şifre değiştirildi!");
      }

      function logout() {
        if (confirm("Çıkış yapmak istediğinize emin misiniz?")) {
          window.location.href = "index.html";
        }
      }
    </script>
  </body>
</html>
