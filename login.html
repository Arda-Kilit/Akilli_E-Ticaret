<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş Yap - AkıllıShop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 2rem;
      }

      .auth-container {
        background: white;
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-xl);
        width: 100%;
        max-width: 450px;
        padding: 3rem;
        position: relative;
        overflow: hidden;
      }

      .auth-container::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(
          90deg,
          var(--primary-color),
          var(--secondary-color)
        );
      }

      .auth-logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-logo .logo {
        justify-content: center;
        font-size: 2rem;
      }

      .auth-title {
        text-align: center;
        margin-bottom: 0.5rem;
        color: var(--text-dark);
        font-size: 1.75rem;
      }

      .auth-subtitle {
        text-align: center;
        color: var(--text-light);
        margin-bottom: 2rem;
      }

      .social-login {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .social-btn {
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-weight: 500;
        transition: var(--transition);
      }

      .social-btn:hover {
        background: var(--bg-light);
      }

      .social-btn.google {
        color: #db4437;
      }
      .social-btn.facebook {
        color: #4267b2;
      }

      .divider {
        text-align: center;
        margin: 1.5rem 0;
        position: relative;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border-color);
      }

      .divider span {
        background: white;
        padding: 0 1rem;
        position: relative;
        color: var(--text-light);
        font-size: 0.875rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-dark);
      }

      .input-group {
        position: relative;
      }

      .input-group i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
      }

      .input-group input {
        width: 100%;
        padding: 0.875rem 1rem 0.875rem 2.75rem;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        font-size: 1rem;
        transition: var(--transition);
      }

      .input-group input:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .input-group .toggle-password {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-light);
        cursor: pointer;
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-light);
      }

      .remember-me input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        accent-color: var(--primary-color);
      }

      .forgot-password {
        color: var(--primary-color);
        font-weight: 500;
      }

      .forgot-password:hover {
        text-decoration: underline;
      }

      .btn-auth {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }

      .auth-footer {
        text-align: center;
        color: var(--text-light);
      }

      .auth-footer a {
        color: var(--primary-color);
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <div class="auth-logo">
          <a href="index.html" class="logo">
            <i class="fas fa-shopping-bag"></i>
            <span>AkıllıShop</span>
          </a>
        </div>

        <h1 class="auth-title">Tekrar Hoş Geldiniz!</h1>
        <p class="auth-subtitle">
          Hesabınıza giriş yaparak alışverişe devam edin
        </p>

        <div class="social-login">
          <button class="social-btn google" onclick="alert('Google ile giriş')">
            <i class="fab fa-google"></i> Google
          </button>
          <button
            class="social-btn facebook"
            onclick="alert('Facebook ile giriş')"
          >
            <i class="fab fa-facebook-f"></i> Facebook
          </button>
        </div>

        <div class="divider">
          <span>veya e-posta ile</span>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label>E-posta Adresi</label>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                name="email"
                placeholder="ornek@email.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label>Şifre</label>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                name="password"
                placeholder="••••••••"
                required
              />
              <i
                class="fas fa-eye toggle-password"
                onclick="togglePassword(this)"
              ></i>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              <span>Beni hatırla</span>
            </label>
            <a href="#" class="forgot-password">Şifremi unuttum?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-sign-in-alt"></i> Giriş Yap
          </button>
        </form>

        <div class="auth-footer">
          Hesabınız yok mu? <a href="register.html">Hemen kayıt olun</a>
        </div>
      </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script>
      function togglePassword(icon) {
        const input = icon.previousElementSibling;
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }

      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = this.querySelector('input[name="email"]').value;
          alert("Giriş yapılıyor: " + email);
          // Burada AJAX ile PHP API'ye bağlanacak
        });
    </script>
  </body>
</html>
