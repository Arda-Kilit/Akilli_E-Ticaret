<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ürün Detayı - AkıllıShop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
    <style>
      .breadcrumb {
        padding: 1rem 0;
        color: #64748b;
        font-size: 0.875rem;
      }

      .breadcrumb a {
        color: #64748b;
      }

      .breadcrumb a:hover {
        color: #6366f1;
      }

      .product-detail {
        padding: 2rem 0 4rem;
      }

      .product-detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
      }

      .product-gallery {
        position: sticky;
        top: 100px;
      }

      .main-image {
        background: #f8fafc;
        border-radius: 1.5rem;
        overflow: hidden;
        margin-bottom: 1rem;
        aspect-ratio: 1;
      }

      .main-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .thumbnail-list {
        display: flex;
        gap: 0.75rem;
      }

      .thumbnail {
        width: 80px;
        height: 80px;
        border-radius: 0.75rem;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s ease;
      }

      .thumbnail:hover,
      .thumbnail.active {
        border-color: #6366f1;
      }

      .thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .product-info-detail h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #0f172a;
      }

      .product-meta {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .product-meta .rating {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .product-meta .stars {
        color: #f59e0b;
      }

      .product-price-detail {
        margin-bottom: 1.5rem;
      }

      .product-price-detail .current {
        font-size: 2.5rem;
        font-weight: 700;
        color: #6366f1;
      }

      .product-price-detail .old {
        font-size: 1.5rem;
        color: #94a3b8;
        text-decoration: line-through;
        margin-left: 1rem;
      }

      .product-price-detail .discount {
        background: #ef4444;
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 600;
        margin-left: 1rem;
      }

      .product-short-desc {
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }

      .product-variants {
        margin-bottom: 1.5rem;
      }

      .variant-title {
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: #0f172a;
      }

      .variant-options {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .color-option {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        box-shadow: 0 0 0 1px #e2e8f0;
        transition: all 0.2s ease;
      }

      .color-option:hover,
      .color-option.active {
        box-shadow: 0 0 0 2px #6366f1;
      }

      .product-actions-detail {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        padding: 1.5rem;
        background: #f8fafc;
        border-radius: 1rem;
      }

      .quantity-selector {
        display: flex;
        align-items: center;
        background: white;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
      }

      .quantity-selector button {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .quantity-selector button:hover {
        color: #6366f1;
      }

      .quantity-selector input {
        width: 50px;
        text-align: center;
        border: none;
        font-weight: 600;
      }

      .btn-add-cart {
        flex: 1;
        padding: 1rem 2rem;
        font-size: 1rem;
      }

      .btn-wishlist {
        width: 50px;
        height: 50px;
        border: 2px solid #e2e8f0;
        border-radius: 0.75rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        color: #64748b;
        background: white;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-wishlist:hover,
      .btn-wishlist.active {
        border-color: #ef4444;
        color: #ef4444;
      }

      .product-features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .feature-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 0.875rem;
        color: #64748b;
      }

      .feature-item i {
        color: #10b981;
      }

      .product-tabs {
        margin-top: 3rem;
      }

      .tabs-header {
        display: flex;
        gap: 2rem;
        border-bottom: 2px solid #e2e8f0;
        margin-bottom: 2rem;
      }

      .tab-btn {
        padding: 1rem 0;
        font-weight: 600;
        color: #64748b;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        background: none;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .tab-btn.active,
      .tab-btn:hover {
        color: #6366f1;
        border-bottom-color: #6366f1;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .specs-table {
        width: 100%;
        border-collapse: collapse;
      }

      .specs-table tr {
        border-bottom: 1px solid #e2e8f0;
      }

      .specs-table td {
        padding: 1rem;
      }

      .specs-table td:first-child {
        font-weight: 600;
        color: #0f172a;
        width: 30%;
      }

      .review-item {
        padding: 1.5rem;
        border-bottom: 1px solid #e2e8f0;
      }

      .review-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.75rem;
      }

      .reviewer {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .reviewer-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #6366f1;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
      }

      .review-date {
        font-size: 0.875rem;
        color: #64748b;
      }

      .review-content {
        color: #64748b;
        line-height: 1.6;
      }

      @media (max-width: 968px) {
        .product-detail-grid {
          grid-template-columns: 1fr;
        }

        .product-gallery {
          position: relative;
          top: 0;
        }
      }

      @media (max-width: 480px) {
        .product-actions-detail {
          flex-direction: column;
        }

        .btn-wishlist {
          width: 100%;
          height: 50px;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner"></div>
    </div>

    <header class="main-header">
      <div class="header-main">
        <div class="container">
          <a href="index.html" class="logo"
            ><i class="fas fa-shopping-bag"></i><span>AkıllıShop</span></a
          >
          <div class="header-actions">
            <a href="login.html" class="header-action" id="desktopLoginLink"
              ><i class="fas fa-user"></i><span>Giriş</span></a
            >
            <a
              href="profile.html"
              class="header-action"
              id="desktopProfileLink"
              style="display: none"
              ><i class="fas fa-user-check"></i><span>Profilim</span></a
            >
            <a href="cart.html" class="header-action"
              ><i class="fas fa-shopping-cart"></i><span>Sepet</span
              ><span class="cart-count" id="cartCount">0</span></a
            >
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <nav class="breadcrumb">
        <a href="index.html">Ana Sayfa</a>
        <i class="fas fa-chevron-right"></i>
        <a href="products.html">Ürünler</a>
        <i class="fas fa-chevron-right"></i>
        <span id="productName">Ürün Detayı</span>
      </nav>

      <section class="product-detail">
        <div class="product-detail-grid">
          <div class="product-gallery">
            <div class="main-image">
              <img
                id="mainImage"
                src="https://via.placeholder.com/600"
                alt="Ürün görseli"
              />
            </div>
            <div class="thumbnail-list" id="thumbnailList"></div>
          </div>

          <div class="product-info-detail">
            <h1 id="productTitle">Ürün Adı</h1>

            <div class="product-meta">
              <div class="rating">
                <span class="stars" id="productRating"></span>
                <span class="review-count" id="reviewCount"
                  >0 Değerlendirme</span
                >
              </div>
              <span class="sku" id="productSku">SKU: ---</span>
            </div>

            <div class="product-price-detail" id="productPriceContainer"></div>

            <p class="product-short-desc" id="productDesc">
              Ürün açıklaması yükleniyor...
            </p>

            <div class="product-variants" id="variantsContainer"></div>

            <div class="product-actions-detail">
              <div class="quantity-selector">
                <button onclick="updateQty(-1)">
                  <i class="fas fa-minus"></i>
                </button>
                <input type="number" value="1" min="1" max="99" id="qtyInput" />
                <button onclick="updateQty(1)">
                  <i class="fas fa-plus"></i>
                </button>
              </div>
              <button class="btn btn-primary btn-add-cart" id="addToCartBtn">
                <i class="fas fa-shopping-cart"></i> Sepete Ekle
              </button>
              <button class="btn-wishlist" id="wishlistBtn">
                <i class="far fa-heart"></i>
              </button>
            </div>

            <div class="product-features">
              <div class="feature-item">
                <i class="fas fa-check-circle"></i
                ><span id="stockStatus">Stok durumu kontrol ediliyor...</span>
              </div>
              <div class="feature-item">
                <i class="fas fa-truck"></i
                ><span>Ücretsiz kargo (150₺ üzeri)</span>
              </div>
              <div class="feature-item">
                <i class="fas fa-shield-alt"></i><span>2 yıl garanti</span>
              </div>
            </div>

            <div class="product-tabs">
              <div class="tabs-header">
                <button class="tab-btn active" onclick="showTab('description')">
                  Açıklama
                </button>
                <button class="tab-btn" onclick="showTab('specs')">
                  Özellikler
                </button>
                <button class="tab-btn" onclick="showTab('reviews')">
                  Değerlendirmeler (<span id="reviewCountBadge">0</span>)
                </button>
              </div>

              <div
                id="description"
                class="tab-content active"
                id="descriptionContent"
              ></div>
              <div id="specs" class="tab-content" id="specsContent"></div>
              <div id="reviews" class="tab-content" id="reviewsContent"></div>
            </div>
          </div>
        </div>
      </section>

      <div class="product-recommendations"></div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/recommendations.js"></script>
    <script>
      let currentProduct = null;
      let selectedVariant = null;
      let currentQuantity = 1;

      function updateQty(change) {
        const input = document.getElementById("qtyInput");
        let val = parseInt(input.value) + change;
        if (val < 1) val = 1;
        if (val > (currentProduct?.quantity || 99))
          val = currentProduct?.quantity || 99;
        input.value = val;
        currentQuantity = val;
      }

      function showTab(tabId) {
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        event.target.classList.add("active");
      }

      async function loadProductDetail() {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get("id");
        if (!productId) {
          window.location.href = "products.html";
          return;
        }

        try {
          const response = await fetch(
            `${APP.config.baseUrl}${APP.config.apiEndpoint}product_api.php?action=detail&id=${productId}`,
          );
          const data = await response.json();

          if (data.success) {
            currentProduct = data.product;
            renderProductDetail(data.product);
          } else {
            APP.showToast("Ürün bulunamadı!", "error");
            setTimeout(() => (window.location.href = "products.html"), 1500);
          }
        } catch (error) {
          APP.showToast("Ürün yüklenirken hata!", "error");
        }
      }

      function renderProductDetail(product) {
        // Temel bilgiler
        document.getElementById("productTitle").textContent = product.name;
        document.getElementById("productName").textContent = product.name;
        document.getElementById("productDesc").textContent =
          product.description || "Ürün açıklaması bulunmamaktadır.";
        document.getElementById("productSku").textContent =
          `SKU: ${product.sku}`;

        // Fiyat
        const price = parseFloat(product.sale_price || product.price);
        const oldPrice = product.sale_price ? parseFloat(product.price) : null;
        const discount = oldPrice
          ? Math.round((1 - price / oldPrice) * 100)
          : 0;

        let priceHtml = `<span class="current">${APP.formatPrice(price)}</span>`;
        if (oldPrice) {
          priceHtml += `<span class="old">${APP.formatPrice(oldPrice)}</span>`;
          priceHtml += `<span class="discount">-${discount}%</span>`;
        }
        document.getElementById("productPriceContainer").innerHTML = priceHtml;

        // Stok durumu
        const stockStatus = document.getElementById("stockStatus");
        if (product.quantity > 0) {
          stockStatus.innerHTML = `<i class="fas fa-check-circle"></i> Stokta var (${product.quantity} adet)`;
          stockStatus.style.color = "#10b981";
        } else {
          stockStatus.innerHTML = `<i class="fas fa-times-circle"></i> Stokta yok`;
          stockStatus.style.color = "#ef4444";
          document.getElementById("addToCartBtn").disabled = true;
          document.getElementById("addToCartBtn").style.opacity = "0.5";
        }

        // Ana görsel
        const mainImage =
          product.images?.find((img) => img.is_main) || product.images?.[0];
        if (mainImage) {
          document.getElementById("mainImage").src = mainImage.image_path;
        }

        // Thumbnail'ler
        if (product.images && product.images.length > 0) {
          const thumbnailHtml = product.images
            .map(
              (img) => `
                    <div class="thumbnail" onclick="changeImage(this, '${img.image_path}')">
                        <img src="${img.image_path}" alt="">
                    </div>
                `,
            )
            .join("");
          document.getElementById("thumbnailList").innerHTML = thumbnailHtml;
          document.querySelector(".thumbnail")?.classList.add("active");
        }

        // Varyantlar
        if (product.variants && product.variants.length > 0) {
          const variantHtml = `
                    <div class="variant-title">Varyant Seçimi:</div>
                    <div class="variant-options">
                        ${product.variants
                          .map(
                            (v) => `
                            <div class="variant-option" data-variant-id="${v.id}" data-price-diff="${v.price_difference}" onclick="selectVariant(this, ${v.id}, ${v.price_difference})">
                                ${v.variant_name} ${v.price_difference > 0 ? `(+${APP.formatPrice(v.price_difference)})` : ""}
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                `;
          document.getElementById("variantsContainer").innerHTML = variantHtml;
        }

        // Değerlendirmeler
        if (product.reviews && product.reviews.length > 0) {
          const avgRating =
            product.reviews.reduce((sum, r) => sum + r.rating, 0) /
            product.reviews.length;
          const stars =
            "★".repeat(Math.floor(avgRating)) +
            "☆".repeat(5 - Math.floor(avgRating));
          document.getElementById("productRating").innerHTML = stars;
          document.getElementById("reviewCount").textContent =
            `${product.reviews.length} Değerlendirme`;
          document.getElementById("reviewCountBadge").textContent =
            product.reviews.length;

          const reviewsHtml = product.reviews
            .map(
              (r) => `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="reviewer">
                                <div class="reviewer-avatar">${r.first_name?.charAt(0) || "U"}</div>
                                <div>
                                    <div class="reviewer-name">${r.first_name || "Kullanıcı"} ${r.last_name || ""}</div>
                                    <div class="stars">${"★".repeat(r.rating)}${"☆".repeat(5 - r.rating)}</div>
                                </div>
                            </div>
                            <span class="review-date">${new Date(r.created_at).toLocaleDateString("tr-TR")}</span>
                        </div>
                        <div class="review-content">${r.comment || "Değerlendirme yapılmamış."}</div>
                    </div>
                `,
            )
            .join("");
          document.getElementById("reviewsContent").innerHTML = reviewsHtml;
        } else {
          document.getElementById("reviewsContent").innerHTML =
            "<p>Henüz değerlendirme yapılmamış.</p>";
        }

        // Açıklama
        document.getElementById("descriptionContent").innerHTML =
          `<h3>Ürün Açıklaması</h3><p>${product.description || "Ürün açıklaması bulunmamaktadır."}</p>`;

        // Özellikler
        document.getElementById("specsContent").innerHTML = `
                <table class="specs-table">
                    <tr><td>Marka</td><td>${product.brand || "AkıllıShop"}</td></tr>
                    <tr><td>Model</td><td>${product.model || product.name}</td></tr>
                    <tr><td>SKU</td><td>${product.sku}</td></tr>
                    <tr><td>Kategori</td><td>${product.category_name || "-"}</td></tr>
                    <tr><td>Stok Durumu</td><td>${product.quantity > 0 ? "Stokta var" : "Stokta yok"}</td></tr>
                </table>
            `;

        // Favori durumu
        const isFavorite = APP.state.favorites.has(product.id);
        const wishlistBtn = document.getElementById("wishlistBtn");
        if (isFavorite) {
          wishlistBtn.classList.add("active");
          wishlistBtn.querySelector("i").classList.remove("far");
          wishlistBtn.querySelector("i").classList.add("fas");
        }

        // Sepete ekle butonu
        document.getElementById("addToCartBtn").onclick = () => {
          APP.addToCart(
            product.id,
            currentQuantity,
            selectedVariant,
            document.getElementById("addToCartBtn"),
          );
        };

        // Favori butonu
        wishlistBtn.onclick = () => {
          APP.toggleWishlist(product.id, wishlistBtn);
        };
      }

      function changeImage(thumb, src) {
        document.getElementById("mainImage").src = src;
        document
          .querySelectorAll(".thumbnail")
          .forEach((t) => t.classList.remove("active"));
        thumb.classList.add("active");
      }

      function selectVariant(el, variantId, priceDiff) {
        document
          .querySelectorAll(".variant-option")
          .forEach((opt) => opt.classList.remove("active"));
        el.classList.add("active");
        selectedVariant = variantId;

        // Fiyat güncelleme
        const basePrice = parseFloat(
          currentProduct.sale_price || currentProduct.price,
        );
        const newPrice = basePrice + parseFloat(priceDiff);
        const oldPrice = currentProduct.sale_price
          ? parseFloat(currentProduct.price)
          : null;

        let priceHtml = `<span class="current">${APP.formatPrice(newPrice)}</span>`;
        if (oldPrice) {
          priceHtml += `<span class="old">${APP.formatPrice(oldPrice)}</span>`;
          const discount = Math.round((1 - newPrice / oldPrice) * 100);
          if (discount > 0)
            priceHtml += `<span class="discount">-${discount}%</span>`;
        }
        document.getElementById("productPriceContainer").innerHTML = priceHtml;
      }

      window.addEventListener("load", () => {
        const spinner = document.getElementById("loadingSpinner");
        if (spinner) spinner.classList.add("hide");
        loadProductDetail();
      });
    </script>
  </body>
</html>
